<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather & Packing Planner</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
    <!-- Icons (Feather) -->
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
    <div class="app-container">
        <!-- Live Animated Background -->
        <div id="weather-background" class="weather-bg-container"></div>

        <header>
            <h1><i data-feather="cloud-rain" style="color: var(--accent-color); width: 32px; height: 32px;"></i> Weather & Packing Planner</h1>
        </header>

        <div style="text-align: center; margin-bottom: 16px;">
            <div class="unit-toggle" id="unit-toggle" style="display: inline-flex;">
                <span id="unit-c" class="active">°C</span>
                <span style="color: #d1d5db;">|</span>
                <span id="unit-f" class="inactive">°F</span>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="search-container">
            <form id="search-form" style="display: flex; gap: 8px; width: 100%;">
                <input type="text" id="search-input" class="search-input" placeholder="Search for a city... (e.g., London)">
                <button type="submit" class="btn" id="search-btn">
                    <i data-feather="search"></i> Search
                </button>
                <button type="button" class="btn btn-icon" id="location-btn" title="Use My Location">
                    <i data-feather="map-pin"></i>
                </button>
            </form>
        </div>

        <!-- Search History -->
        <div class="search-history" id="search-history" style="display: none;">
            <span style="display: flex; align-items: center; gap: 4px; color: rgba(255,255,255,0.7);">
                <i data-feather="clock" style="width: 14px; height: 14px;"></i> Recent:
            </span>
            <div class="history-pills" id="history-pills"></div>
        </div>

        <!-- Error Message -->
        <div id="error-message" class="error-message" style="display: none;"></div>

        <!-- Loading Spinner -->
        <div id="loading-spinner" class="loading-spinner" style="display: none;"></div>

        <!-- Dashboard (Hidden initially) -->
        <div id="dashboard" style="display: none;">
            <div class="dashboard-grid">
                <!-- Current Weather -->
                <div class="glass-card current-weather">
                    <h2 class="section-title">Your Location</h2>
                    <h3 class="location-name" id="location-name">City Name</h3>
                    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 24px;">
                        <span id="current-condition-text" style="font-size: 1.2rem; font-weight: 500;">Condition</span>
                        <span id="current-condition-icon" style="font-size: 2rem;"></span>
                    </div>
                    
                    <div class="weather-temp" id="current-temp">0°C</div>
                    
                    <div class="weather-details">
                        <div class="detail-item">
                            <i data-feather="droplet" style="color: var(--accent-color);"></i>
                            <span id="current-humidity">0%</span> Humidity
                        </div>
                        <div class="detail-item">
                            <i data-feather="wind" style="color: var(--accent-color);"></i>
                            <span id="current-wind">0 km/h</span> Wind
                        </div>
                    </div>
                </div>

                <!-- Packing List -->
                <div class="glass-card packing-list-card">
                    <h3 class="section-title" style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                        <i data-feather="check-square"></i> Packing Recommendations
                    </h3>
                    <p style="font-size: 0.9rem; color: rgba(255,255,255,0.7); margin-bottom: 20px;">
                        Based on: <span id="packing-based-on">Condition</span>
                    </p>
                    <div id="packing-items" style="display: flex; flex-direction: column; gap: 12px;"></div>
                </div>
            </div>

            <!-- Forecast -->
            <div class="glass-card" style="grid-column: 1 / -1; overflow: hidden; margin-top: 24px;">
                <h3 class="section-title" style="margin-bottom: 20px;">7-Day Extended Forecast</h3>
                <div class="forecast-container" id="forecast-container"></div>
            </div>
        </div>
    </div>

    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
